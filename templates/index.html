<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧便利店实时监控大屏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: "Segoe UI", Arial, sans-serif; }
        .chart-container { height: 400px; width: 100%; }
        .status-dot {
            height: 10px; width: 10px; background-color: #198754;
            border-radius: 50%; display: inline-block; margin-right: 8px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.4;} 100% {opacity:1;} }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">🏪 便利店管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">📊 监控大屏</a></li>
                    <li class="nav-item"><a class="nav-link" href="/manage">📝 订单管理</a></li>
                </ul>
                <span class="navbar-text me-3"><span class="status-dot"></span>欢迎, {{ username }}</span>
                <a href="/logout" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
        <div class="row mb-4">
            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card border-primary border-start border-4 shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">今日累计营业额</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="total-revenue">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card border-success border-start border-4 shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">今日进店总人次</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="total-visitors">0</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card border-info border-start border-4 shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="text-xs font-weight-bold text-info text-uppercase mb-1">当前店内人数</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800" id="current-inside">0</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-3">
                <div class="card border-warning border-start border-4 shadow-sm h-100 py-2">
                    <div class="card-body">
                        <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">自助结账机状态</div>
                        <div class="h5 mb-0 font-weight-bold text-success">正常 (0 告警)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white py-3">
                        <h6 class="m-0 font-weight-bold text-primary">历史商品品类【营业额】排行 (Pandas 聚合)</h6>
                    </div>
                    <div class="card-body"><div id="offlineChart" class="chart-container"></div></div>
                </div>
            </div>
            <div class="col-lg-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white py-3">
                        <h6 class="m-0 font-weight-bold text-danger">店内实时客流波动监控 (Flask-SocketIO)</h6>
                    </div>
                    <div class="card-body"><div id="realtimeChart" class="chart-container"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const offlineChart = echarts.init(document.getElementById('offlineChart'));
            
            function renderOfflineChart(data) {
                offlineChart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: data.categories, axisLabel: { interval: 0 } },
                    yAxis: { type: 'value', name: '总营业额(元)' },
                    series: [{ 
                        name: '营业额', data: data.values, type: 'bar', barWidth: '45%',
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#36b9cc' }, { offset: 1, color: '#1a8a9c' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        }
                    }]
                });
            }

            fetch('/api/offline-stats')
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                        return null;
                    }
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(res => {
                    if(res && res.data) {
                        renderOfflineChart(res.data);
                    }
                })
                .catch(e => console.warn("API请求失败:", e));

            const realtimeChart = echarts.init(document.getElementById('realtimeChart'));
            let timeData = [];
            let insidePeopleData = [];

            const realtimeOption = {
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: timeData, boundaryGap: false },
                yAxis: { type: 'value', name: '当前人数(人)', min: 0, max: 'dataMax' },
                series: [{
                    name: '店内人数', type: 'line', showSymbol: true, symbolSize: 6,
                    data: insidePeopleData, smooth: true, itemStyle: { color: '#e74a3b' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(231, 74, 59, 0.4)' },
                            { offset: 1, color: 'rgba(231, 74, 59, 0.0)' }
                        ])
                    }
                }]
            };
            realtimeChart.setOption(realtimeOption);

            try {
                const socket = io();
                socket.on('store_update', function(msg) {
                    document.getElementById('total-revenue').innerText = '¥ ' + msg.revenue.toFixed(2);
                    document.getElementById('total-visitors').innerText = msg.visitors;
                    document.getElementById('current-inside').innerText = msg.current_inside;

                    if (timeData.length >= 30) {
                        timeData.shift();
                        insidePeopleData.shift();
                    }
                    timeData.push(msg.time);
                    insidePeopleData.push(msg.current_inside);

                    realtimeChart.setOption({
                        xAxis: { data: timeData },
                        series: [{ data: insidePeopleData }]
                    });
                });
            } catch(e) {
                console.log("Socket.IO 初始化异常", e);
            }

            window.addEventListener('resize', () => {
                offlineChart.resize();
                realtimeChart.resize();
            });
        });
    </script>
</body>
</html>
